name: emowall
description: "Emowall AI 2.0 - The Living Fortress AI Guardian"
publish_to: 'none'

# Version 2.0.1 and Build 2 for Play Store update
version: 2.0.1+2

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Enhancement & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2 # For Butterfly and UI animations

  # Core Backend & Logic
  http: ^1.2.2 # For Seven Brains AI API calls
  url_launcher: ^6.3.1 # For SOS and external links (Safest way for Play Store)
  
  # Audio & Media
  audioplayers: ^5.2.1 # For Butterfly wing flap sounds/alerts
  image_picker: ^1.1.2 # For Deepfake/Image analysis features

  # Authentication & Security
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Asset linking - Make sure these files exist in your assets folder
  assets:
    - assets/
    - assets/orange_cyan_butterfly.png
