name: emowall
description: "Emowall AI 2.0 - The Living Fortress AI Guardian"
publish_to: 'none'
version: 2.0.1+2

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  http: ^1.2.2
  url_launcher: ^6.3.1
  sensors_plus: ^6.1.1
  flutter_tts: ^4.2.2
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^18.0.1
  audioplayers: ^5.2.1
  image_picker: ^1.1.2
  health: ^10.2.0
  flutter_blue_plus: ^1.31.15
  permission_handler: ^11.3.1
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    # - assets/orange_cyan_butterfly.png (ഇത് താൽക്കാലികമായി ഹൈഡ് ചെയ്തു)
